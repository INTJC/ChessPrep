<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ChessPrep Lab Self Match line icon</title>
  <desc id="desc">A simplified line drawing of a chess player facing a holographic version of himself over a chessboard.</desc>
  <defs>
    <linearGradient id="lineBg" x1="64" x2="448" y1="40" y2="482" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#132334"/>
      <stop offset=".55" stop-color="#0a111b"/>
      <stop offset="1" stop-color="#151327"/>
    </linearGradient>
    <linearGradient id="wordGold" x1="88" x2="424" y1="398" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1bd"/>
      <stop offset=".55" stop-color="#d9ae55"/>
      <stop offset="1" stop-color="#8c5a21"/>
    </linearGradient>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#6ff7ee" flood-opacity=".6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#4a8cff" flood-opacity=".25"/>
    </filter>
    <style>
      .warm-line {
        fill: none;
        stroke: #f3d184;
        stroke-width: 9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .thin-warm {
        fill: none;
        stroke: #f3d184;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .cool-line {
        fill: none;
        stroke: #79f6ee;
        stroke-width: 9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .thin-cool {
        fill: none;
        stroke: #79f6ee;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .board-line {
        fill: none;
        stroke: #f5df9c;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#lineBg)"/>
  <path d="M99 88c45-28 96-38 153-30" class="thin-warm" opacity=".17"/>
  <path d="M402 392c-38 34-87 51-146 49" class="thin-cool" opacity=".17"/>

  <g aria-label="real player">
    <circle cx="145" cy="128" r="36" class="warm-line"/>
    <path d="M111 154c22 20 48 28 78 23" class="thin-warm" opacity=".55"/>
    <path d="M103 270c7-52 21-86 43-104 29 23 58 23 87 0 22 19 37 53 43 102" class="warm-line"/>
    <path d="M179 233c28 16 51 36 70 61" class="warm-line"/>
    <path d="M102 303c37 24 84 31 141 21" class="thin-warm"/>
  </g>

  <g aria-label="holographic player" filter="url(#cyanGlow)" opacity=".9">
    <circle cx="366" cy="128" r="36" class="cool-line" stroke-dasharray="24 12"/>
    <path d="M400 154c-22 20-48 28-78 23" class="thin-cool" opacity=".62"/>
    <path d="M409 270c-7-52-21-86-43-104-29 23-58 23-87 0-22 19-37 53-43 102" class="cool-line" stroke-dasharray="28 12"/>
    <path d="M333 233c-28 16-51 36-70 61" class="cool-line" opacity=".72"/>
    <path d="M409 303c-37 24-84 31-141 21" class="thin-cool" stroke-dasharray="20 11"/>
    <path d="M418 103h30M420 128h22M418 284h32M421 309h22" class="thin-cool"/>
  </g>

  <g aria-label="simple chessboard">
    <path d="M136 247h240l34 91H102l34-91z" fill="#0a1019" opacity=".72"/>
    <path d="M136 247h240l34 91H102l34-91z" class="board-line"/>
    <path d="M136 247 102 338M166 247 143 338M196 247 184 338M226 247 225 338M256 247v91M286 247l11 91M316 247l52 91M346 247l64 91" class="thin-warm" opacity=".62"/>
    <path d="M121 292h270M111 315h289M147 270h238" class="thin-warm" opacity=".62"/>
    <g aria-label="chess pieces">
      <path d="M159 286v-22M149 272h20M151 286h16M146 302h26M150 286c2-12 7-18 9-22 2 4 7 10 9 22" class="board-line"/>
      <path d="M201 304c3-20 12-35 29-48 11 10 12 22 1 34 8 5 13 12 15 24h-45zM196 320h53" class="board-line"/>
      <path d="M306 284h38M313 284v-22h8v7h14v-7h8v22M310 304h41M316 284c-2 8-4 15-8 20M339 284c3 8 6 15 9 20" class="board-line"/>
      <path d="M362 304c0-18 8-27 19-27s19 9 19 27M357 320h48M381 277v-16M372 268h18" class="board-line"/>
    </g>
  </g>

  <g aria-label="ChessPrep Lab">
    <path d="M88 397h336c22 0 40 18 40 40s-18 40-40 40H88c-22 0-40-18-40-40s18-40 40-40z" fill="#050911" opacity=".94"/>
    <path d="M102 410h308c15 0 27 12 27 27s-12 27-27 27H102c-15 0-27-12-27-27s12-27 27-27z" fill="none" stroke="url(#wordGold)" stroke-width="5"/>
    <path d="M127 418c43 5 86 5 129 0 43-5 86-5 129 0" class="thin-cool" opacity=".45"/>
    <text x="121" y="447" text-anchor="start" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="900" fill="#fff0bd">ChessPrep</text>
    <g transform="translate(324 421)">
      <path d="M0 0h65c12 0 22 10 22 22s-10 22-22 22H0c-12 0-22-10-22-22S-12 0 0 0z" fill="#122333" stroke="#79f6ee" stroke-width="4"/>
      <rect x="1" y="12" width="20" height="20" rx="3" fill="none" stroke="#79f6ee" stroke-width="3"/>
      <path d="M11 12v20M1 22h20" stroke="#79f6ee" stroke-width="3" stroke-linecap="round"/>
      <path d="M1 12h10v10H1zM11 22h10v10H11z" fill="#79f6ee" opacity=".26"/>
      <text x="51" y="31" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="900" fill="#79f6ee">LAB</text>
    </g>
    <path d="M116 455h188M399 455h10" stroke="#d9ae55" stroke-width="4" stroke-linecap="round" opacity=".7"/>
  </g>
</svg>
